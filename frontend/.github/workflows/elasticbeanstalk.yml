name: Deploy Ionic React Vite to Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Build Vite app
      - name: Build Vite app
        run: npm run build

      # 5. Zip the deployment package
      - name: Prepare deployment package
        run: |
          rm -f app.zip
          zip -r app.zip dist package.json server.js

      # 6. Generate timestamp for EB version label
      - name: Generate timestamp
        id: timestamp
        run: echo "TIMESTAMP=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      # 7. Deploy to Elastic Beanstalk
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: T-clone-front
          environment_name: T-clone-front-env
          region: eu-north-1
          version_label: ${{ github.sha }}-${{ env.TIMESTAMP }}
          deployment_package: app.zip
          wait_for_deployment: true
